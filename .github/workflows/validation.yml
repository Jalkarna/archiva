name: Heavy validation

on:
  workflow_dispatch:
    inputs:
      corpus_repository:
        description: External corpus repository.
        required: true
        default: microsoft/TypeScript
      corpus_ref:
        description: External corpus commit, branch, or tag.
        required: true
        default: 637d5746b70257028fb95aad32ddec6b26ab0a14
      sparse_paths:
        description: Newline-separated sparse checkout paths.
        required: true
        default: src
      corpus_language:
        description: Corpus language mode, auto, typescript, rust, or c/cpp.
        required: true
        default: auto
      corpus_files:
        description: Maximum corpus source files to copy.
        required: true
        default: "80"
      corpus_decisions:
        description: Number of corpus decisions to write.
        required: true
        default: "30"
      corpus_mutate_files:
        description: Number of corpus decision files to mutate.
        required: true
        default: "20"
      run_long_horizon:
        description: Also run the scheduled multi-corpus validation matrix.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 7 * * 1"

jobs:
  heavy-validation:
    runs-on: ubuntu-latest
    env:
      ARCHIVA_CORPUS_REPOSITORY: ${{ github.event.inputs.corpus_repository || 'microsoft/TypeScript' }}
      ARCHIVA_CORPUS_REF: ${{ github.event.inputs.corpus_ref || '637d5746b70257028fb95aad32ddec6b26ab0a14' }}
      ARCHIVA_CORPUS_SPARSE_PATHS: ${{ github.event.inputs.sparse_paths || 'src' }}
      ARCHIVA_SCALE_CORPUS_LANGUAGE: ${{ github.event.inputs.corpus_language || 'auto' }}
      ARCHIVA_SCALE_CORPUS_FILES: ${{ github.event.inputs.corpus_files || '80' }}
      ARCHIVA_SCALE_CORPUS_DECISIONS: ${{ github.event.inputs.corpus_decisions || '30' }}
      ARCHIVA_SCALE_CORPUS_MUTATE_FILES: ${{ github.event.inputs.corpus_mutate_files || '20' }}
      ARCHIVA_BENCHMARK_COMPARE_TIMEOUT_MS: "900000"
      ARCHIVA_BASELINE_COMMAND_TIMEOUT_MS: "300000"
      ARCHIVA_SCALE_COMMAND_TIMEOUT_MS: "600000"
    steps:
      - name: Checkout Archiva
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.96.0

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Rust property soak
        run: npm run property:soak

      - name: Build package artifacts
        run: npm run build

      - name: Test
        run: npm test

      - name: Package smoke test
        run: npm run smoke:package

      - name: Native differential
        run: |
          set -o pipefail
          npm run --silent differential:release | tee archiva-differential.json

      - name: Native stress soak
        run: |
          set -o pipefail
          npm run --silent stress:soak | tee archiva-stress-soak.json

      - name: Benchmark comparison
        timeout-minutes: 20
        run: |
          set -o pipefail
          npm run --silent benchmark:compare | tee archiva-benchmark.json

      - name: Synthetic scale smoke
        timeout-minutes: 20
        run: |
          set -o pipefail
          npm run --silent scale:smoke | tee archiva-scale-smoke.json

      - name: Combined seeded scale
        timeout-minutes: 60
        env:
          ARCHIVA_SCALE_FILES: "2"
          ARCHIVA_SCALE_DECISIONS: "2"
          ARCHIVA_SCALE_MUTATE_FILES: "1"
          ARCHIVA_SCALE_PARITY_FILES: "1"
          ARCHIVA_SCALE_PARITY_DECISIONS: "1"
          ARCHIVA_SCALE_PARITY_MUTATE_FILES: "1"
          ARCHIVA_SCALE_SEEDED: "1"
          ARCHIVA_SCALE_SEEDED_FILES: "100000"
          ARCHIVA_SCALE_SEEDED_DECISIONS: "1000000"
          ARCHIVA_SCALE_SEEDED_DECISIONS_PER_FILE: "10"
          ARCHIVA_SCALE_SEEDED_MUTATE_FILES: "1000"
          ARCHIVA_SCALE_COMMAND_MAX_BUFFER_MB: "2048"
        run: |
          set -o pipefail
          npm run --silent scale:smoke | tee archiva-scale-seeded.json

      - name: Checkout external corpus
        uses: actions/checkout@v7
        with:
          repository: ${{ env.ARCHIVA_CORPUS_REPOSITORY }}
          ref: ${{ env.ARCHIVA_CORPUS_REF }}
          path: corpus
          sparse-checkout: ${{ env.ARCHIVA_CORPUS_SPARSE_PATHS }}
          sparse-checkout-cone-mode: false

      - name: External corpus scale
        timeout-minutes: 45
        run: |
          set -o pipefail
          ARCHIVA_SCALE_CORPUS_ROOT="$GITHUB_WORKSPACE/corpus" \
            npm run --silent scale:corpus | tee archiva-scale-corpus.json

      - name: Rust self-corpus scale
        timeout-minutes: 20
        env:
          ARCHIVA_SCALE_CORPUS_FILES: "40"
          ARCHIVA_SCALE_CORPUS_DECISIONS: "24"
          ARCHIVA_SCALE_CORPUS_MUTATE_FILES: "16"
        run: |
          set -o pipefail
          ARCHIVA_SCALE_CORPUS_ROOT="$GITHUB_WORKSPACE/src" \
            npm run --silent scale:corpus:rust | tee archiva-scale-rust-corpus.json

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: archiva-heavy-validation
          path: |
            archiva-differential.json
            archiva-stress-soak.json
            archiva-benchmark.json
            archiva-scale-smoke.json
            archiva-scale-seeded.json
            archiva-scale-corpus.json
            archiva-scale-rust-corpus.json

  long-horizon-corpus:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_long_horizon == 'true' }}
    name: Long-horizon corpus ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rust-compiler
            repository: rust-lang/rust
            ref: 096694416a41840709140eb0fd0ca193d1a3e6ba
            sparse_paths: |
              compiler/rustc_ast/src
              compiler/rustc_middle/src
            language: rust
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: cargo
            repository: rust-lang/cargo
            ref: 1ee1ce4eaec3c2433e0b28fc3e903ee917c5eea8
            sparse_paths: |
              src
              crates
            language: rust
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: ripgrep
            repository: BurntSushi/ripgrep
            ref: dfe4a81d2591daca76d25ae4e052c34b26578155
            sparse_paths: |
              crates
              src
            language: rust
            files: "100"
            decisions: "40"
            mutate_files: "24"
          - name: tokio
            repository: tokio-rs/tokio
            ref: 7b354d22a9b77cd66c3b622e6fca9fe3b77133d1
            sparse_paths: |
              tokio/src
              tokio-macros/src
            language: rust
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: linux-kernel
            repository: torvalds/linux
            ref: dc59e4fea9d83f03bad6bddf3fa2e52491777482
            sparse_paths: |
              kernel
              mm
              fs
            language: c/cpp
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: llvm
            repository: llvm/llvm-project
            ref: 2902b031f0fd3e02444db4b536da798d4d358ea4
            sparse_paths: |
              llvm/lib/Analysis
              llvm/lib/IR
              clang/lib/AST
              clang/lib/Sema
            language: c/cpp
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: typescript
            repository: microsoft/TypeScript
            ref: 637d5746b70257028fb95aad32ddec6b26ab0a14
            sparse_paths: src
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: node
            repository: nodejs/node
            ref: f2f241a40ffca9ec72a103842a5e52c0c4f52767
            sparse_paths: lib
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: react
            repository: facebook/react
            ref: d4e44545a984186fc97783e130896e9c2e5c1a63
            sparse_paths: packages
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: next
            repository: vercel/next.js
            ref: 44684abb43687f7f1b06a5417887b0fcf971fccb
            sparse_paths: packages
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
    env:
      ARCHIVA_BENCHMARK_COMPARE_TIMEOUT_MS: "900000"
      ARCHIVA_BASELINE_COMMAND_TIMEOUT_MS: "300000"
      ARCHIVA_SCALE_COMMAND_TIMEOUT_MS: "600000"
      ARCHIVA_SCALE_COMMAND_MAX_BUFFER_MB: "1024"
    steps:
      - name: Checkout Archiva
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.96.0

      - name: Install
        run: npm ci

      - name: Build package artifacts
        run: npm run build

      - name: Checkout corpus
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: corpus
          sparse-checkout: ${{ matrix.sparse_paths }}
          sparse-checkout-cone-mode: false

      - name: Corpus scale
        timeout-minutes: 60
        env:
          ARCHIVA_SCALE_CORPUS_ROOT: ${{ github.workspace }}/corpus
          ARCHIVA_SCALE_CORPUS_LANGUAGE: ${{ matrix.language }}
          ARCHIVA_SCALE_CORPUS_FILES: ${{ matrix.files }}
          ARCHIVA_SCALE_CORPUS_DECISIONS: ${{ matrix.decisions }}
          ARCHIVA_SCALE_CORPUS_MUTATE_FILES: ${{ matrix.mutate_files }}
        run: |
          set -o pipefail
          npm run --silent scale:corpus | tee "archiva-long-horizon-${{ matrix.name }}.json"

      - name: Upload corpus artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: archiva-long-horizon-${{ matrix.name }}
          path: archiva-long-horizon-${{ matrix.name }}.json
