name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  heavy-validation:
    runs-on: ubuntu-22.04
    env:
      ARCHIVA_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
      ARCHIVA_CORPUS_REPOSITORY: microsoft/TypeScript
      ARCHIVA_CORPUS_REF: 637d5746b70257028fb95aad32ddec6b26ab0a14
      ARCHIVA_CORPUS_SPARSE_PATHS: src
      ARCHIVA_SCALE_CORPUS_LANGUAGE: auto
      ARCHIVA_SCALE_CORPUS_FILES: "80"
      ARCHIVA_SCALE_CORPUS_DECISIONS: "30"
      ARCHIVA_SCALE_CORPUS_MUTATE_FILES: "20"
      ARCHIVA_BENCHMARK_COMPARE_TIMEOUT_MS: "900000"
      ARCHIVA_BASELINE_COMMAND_TIMEOUT_MS: "300000"
      ARCHIVA_SCALE_COMMAND_TIMEOUT_MS: "600000"
    steps:
      - name: Checkout Archiva
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.96.0

      - name: Refresh lockfile registry metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Install
        run: npm ci

      - name: Restore committed lockfile
        run: git checkout -- package-lock.json

      - name: Verify release version
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const cargo = fs.readFileSync("Cargo.toml", "utf8");
          const cargoVersion = cargo.match(/^version = "([^"]+)"$/m)?.[1];
          if (cargoVersion !== packageVersion) {
            throw new Error(`Cargo.toml version ${cargoVersion ?? "<missing>"} does not match package.json ${packageVersion}.`);
          }

          const releaseTag = process.env.ARCHIVA_RELEASE_TAG;
          const expectedTag = `v${packageVersion}`;
          if (releaseTag) {
            if (releaseTag !== expectedTag) {
              throw new Error(`Release tag ${releaseTag} does not match package version ${packageVersion}; expected ${expectedTag}.`);
            }
          } else if (process.env.GITHUB_EVENT_NAME === "workflow_dispatch") {
            const expectedRef = `refs/tags/${expectedTag}`;
            if (process.env.GITHUB_REF !== expectedRef) {
              throw new Error(`Manual publish must run from ${expectedRef}; got ${process.env.GITHUB_REF ?? "<missing>"}.`);
            }
          }
          NODE

      - name: Check
        run: npm run check

      - name: Build package artifacts
        run: npm run build

      - name: Test
        run: npm test

      - name: Package smoke test
        run: npm run smoke:package

      - name: Rust property soak
        run: npm run property:soak

      - name: Native differential
        run: |
          set -o pipefail
          npm run --silent differential:release | tee archiva-differential.json

      - name: Native stress soak
        run: |
          set -o pipefail
          npm run --silent stress:soak | tee archiva-stress-soak.json

      - name: Benchmark comparison
        timeout-minutes: 20
        run: |
          set -o pipefail
          npm run --silent benchmark:compare | tee archiva-benchmark.json

      - name: Synthetic scale smoke
        timeout-minutes: 20
        run: |
          set -o pipefail
          npm run --silent scale:smoke | tee archiva-scale-smoke.json

      - name: Combined seeded scale
        timeout-minutes: 60
        env:
          ARCHIVA_SCALE_FILES: "2"
          ARCHIVA_SCALE_DECISIONS: "2"
          ARCHIVA_SCALE_MUTATE_FILES: "1"
          ARCHIVA_SCALE_PARITY_FILES: "1"
          ARCHIVA_SCALE_PARITY_DECISIONS: "1"
          ARCHIVA_SCALE_PARITY_MUTATE_FILES: "1"
          ARCHIVA_SCALE_SEEDED: "1"
          ARCHIVA_SCALE_SEEDED_FILES: "100000"
          ARCHIVA_SCALE_SEEDED_DECISIONS: "1000000"
          ARCHIVA_SCALE_SEEDED_DECISIONS_PER_FILE: "10"
          ARCHIVA_SCALE_SEEDED_MUTATE_FILES: "1000"
          ARCHIVA_SCALE_COMMAND_MAX_BUFFER_MB: "2048"
        run: |
          set -o pipefail
          npm run --silent scale:smoke | tee archiva-scale-seeded.json

      - name: Checkout external corpus
        uses: actions/checkout@v7
        with:
          repository: ${{ env.ARCHIVA_CORPUS_REPOSITORY }}
          ref: ${{ env.ARCHIVA_CORPUS_REF }}
          path: corpus
          sparse-checkout: ${{ env.ARCHIVA_CORPUS_SPARSE_PATHS }}
          sparse-checkout-cone-mode: false

      - name: External corpus scale
        timeout-minutes: 45
        run: |
          set -o pipefail
          ARCHIVA_SCALE_CORPUS_ROOT="$GITHUB_WORKSPACE/corpus" \
            npm run --silent scale:corpus | tee archiva-scale-corpus.json

      - name: Rust self-corpus scale
        timeout-minutes: 20
        env:
          ARCHIVA_SCALE_CORPUS_FILES: "40"
          ARCHIVA_SCALE_CORPUS_DECISIONS: "24"
          ARCHIVA_SCALE_CORPUS_MUTATE_FILES: "16"
        run: |
          set -o pipefail
          ARCHIVA_SCALE_CORPUS_ROOT="$GITHUB_WORKSPACE/src" \
            npm run --silent scale:corpus:rust | tee archiva-scale-rust-corpus.json

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: archiva-publish-heavy-validation
          path: |
            archiva-differential.json
            archiva-stress-soak.json
            archiva-benchmark.json
            archiva-scale-smoke.json
            archiva-scale-seeded.json
            archiva-scale-corpus.json
            archiva-scale-rust-corpus.json

  long-horizon-corpus:
    needs: heavy-validation
    name: Long-horizon corpus ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rust-compiler
            repository: rust-lang/rust
            ref: 096694416a41840709140eb0fd0ca193d1a3e6ba
            sparse_paths: |
              compiler/rustc_ast/src
              compiler/rustc_middle/src
            language: rust
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: cargo
            repository: rust-lang/cargo
            ref: 1ee1ce4eaec3c2433e0b28fc3e903ee917c5eea8
            sparse_paths: |
              src
              crates
            language: rust
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: ripgrep
            repository: BurntSushi/ripgrep
            ref: dfe4a81d2591daca76d25ae4e052c34b26578155
            sparse_paths: |
              crates
              src
            language: rust
            files: "100"
            decisions: "40"
            mutate_files: "24"
          - name: tokio
            repository: tokio-rs/tokio
            ref: 7b354d22a9b77cd66c3b622e6fca9fe3b77133d1
            sparse_paths: |
              tokio/src
              tokio-macros/src
            language: rust
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: linux-kernel
            repository: torvalds/linux
            ref: dc59e4fea9d83f03bad6bddf3fa2e52491777482
            sparse_paths: |
              kernel
              mm
              fs
            language: c/cpp
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: llvm
            repository: llvm/llvm-project
            ref: 2902b031f0fd3e02444db4b536da798d4d358ea4
            sparse_paths: |
              llvm/lib/Analysis
              llvm/lib/IR
              clang/lib/AST
              clang/lib/Sema
            language: c/cpp
            files: "120"
            decisions: "50"
            mutate_files: "30"
          - name: typescript
            repository: microsoft/TypeScript
            ref: 637d5746b70257028fb95aad32ddec6b26ab0a14
            sparse_paths: src
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: node
            repository: nodejs/node
            ref: f2f241a40ffca9ec72a103842a5e52c0c4f52767
            sparse_paths: lib
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: react
            repository: facebook/react
            ref: d4e44545a984186fc97783e130896e9c2e5c1a63
            sparse_paths: packages
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
          - name: next
            repository: vercel/next.js
            ref: 44684abb43687f7f1b06a5417887b0fcf971fccb
            sparse_paths: packages
            language: typescript
            files: "140"
            decisions: "60"
            mutate_files: "36"
    env:
      ARCHIVA_BENCHMARK_COMPARE_TIMEOUT_MS: "900000"
      ARCHIVA_BASELINE_COMMAND_TIMEOUT_MS: "300000"
      ARCHIVA_SCALE_COMMAND_TIMEOUT_MS: "600000"
      ARCHIVA_SCALE_COMMAND_MAX_BUFFER_MB: "1024"
    steps:
      - name: Checkout Archiva
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.96.0

      - name: Refresh lockfile registry metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Install
        run: npm ci

      - name: Restore committed lockfile
        run: git checkout -- package-lock.json

      - name: Build package artifacts
        run: npm run build

      - name: Checkout corpus
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: corpus
          sparse-checkout: ${{ matrix.sparse_paths }}
          sparse-checkout-cone-mode: false

      - name: Corpus scale
        timeout-minutes: 60
        env:
          ARCHIVA_SCALE_CORPUS_ROOT: ${{ github.workspace }}/corpus
          ARCHIVA_SCALE_CORPUS_LANGUAGE: ${{ matrix.language }}
          ARCHIVA_SCALE_CORPUS_FILES: ${{ matrix.files }}
          ARCHIVA_SCALE_CORPUS_DECISIONS: ${{ matrix.decisions }}
          ARCHIVA_SCALE_CORPUS_MUTATE_FILES: ${{ matrix.mutate_files }}
        run: |
          set -o pipefail
          npm run --silent scale:corpus | tee "archiva-long-horizon-${{ matrix.name }}.json"

      - name: Upload corpus artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: archiva-long-horizon-${{ matrix.name }}
          path: archiva-long-horizon-${{ matrix.name }}.json

  publish-native:
    name: Publish native ${{ matrix.target }}
    needs: [heavy-validation, long-horizon-corpus]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            binary: target/x86_64-unknown-linux-gnu/release/archiva
          - target: linux-x64-musl
            rust_target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            binary: target/x86_64-unknown-linux-musl/release/archiva
          - target: linux-arm64-gnu
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: target/aarch64-unknown-linux-gnu/release/archiva
          - target: linux-arm64-musl
            rust_target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            binary: target/aarch64-unknown-linux-musl/release/archiva
          - target: darwin-x64
            rust_target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: target/x86_64-apple-darwin/release/archiva
          - target: darwin-arm64
            rust_target: aarch64-apple-darwin
            runner: macos-15
            binary: target/aarch64-apple-darwin/release/archiva
          - target: win32-x64-msvc
            rust_target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: target/x86_64-pc-windows-msvc/release/archiva.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt
          rustup default 1.96.0
          rustup target add ${{ matrix.rust_target }}

      - name: Refresh lockfile registry metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Install
        run: npm ci

      - name: Restore committed lockfile
        run: git checkout -- package-lock.json

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.rust_target }}

      - name: Stage native package
        run: node tools/stage-native-package.mjs --target ${{ matrix.target }} --binary "${{ matrix.binary }}"

      - name: Smoke native package
        env:
          ARCHIVA_NATIVE_TARGET: ${{ matrix.target }}
          NPM_CONFIG_INCLUDE: optional
          NPM_CONFIG_IGNORE_SCRIPTS: "false"
        run: npm run smoke:package -- --target ${{ matrix.target }}

      - name: Publish native package
        env:
          ARCHIVA_NATIVE_TARGET: ${{ matrix.target }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node tools/npm-publish-idempotent.mjs --native-target "${{ matrix.target }}"

  publish-meta:
    needs: publish-native
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Refresh lockfile registry metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Install
        run: npm ci

      - name: Restore committed lockfile
        run: git checkout -- package-lock.json

      - name: Verify native packages are published
        run: node tools/npm-publish-idempotent.mjs --verify-native-targets

      - name: Stage meta package
        run: node tools/stage-native-package.mjs --meta-only

      - name: Smoke packed meta package
        env:
          ARCHIVA_NATIVE_TARGET: linux-x64-gnu
          NPM_CONFIG_INCLUDE: optional
          NPM_CONFIG_IGNORE_SCRIPTS: "false"
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          tmpdir="$(mktemp -d)"
          npm pack --pack-destination "$tmpdir" --silent
          pkg="$(find "$tmpdir" -maxdepth 1 -name '*.tgz' -print -quit)"
          node tools/smoke-native-package.mjs --published-spec "$pkg" --expected-version "$VERSION" --target linux-x64-gnu

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node tools/npm-publish-idempotent.mjs --root

  post-publish-smoke:
    needs: publish-meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            runner: ubuntu-22.04
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15
          - target: win32-x64-msvc
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install published package
        shell: bash
        env:
          ARCHIVA_NATIVE_TARGET: ${{ matrix.target }}
          NPM_CONFIG_INCLUDE: optional
          NPM_CONFIG_IGNORE_SCRIPTS: "false"
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          node tools/smoke-native-package.mjs --published-spec "@jalkarna/archiva@$VERSION" --expected-version "$VERSION" --target "${{ matrix.target }}"

  post-publish-musl-smoke:
    needs: publish-meta
    name: Post-publish musl smoke ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    container: node:20-alpine
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-musl
            runner: ubuntu-22.04
          - target: linux-arm64-musl
            runner: ubuntu-24.04-arm
    steps:
      - name: Install published package on musl
        env:
          ARCHIVA_NATIVE_TARGET: ${{ matrix.target }}
          NPM_CONFIG_INCLUDE: optional
          NPM_CONFIG_IGNORE_SCRIPTS: "false"
        run: |
          if [ "${GITHUB_REF_NAME#v}" = "$GITHUB_REF_NAME" ]; then
            echo "Expected tag ref like v<version>; got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION

          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          npm init -y >/dev/null
          npm install --include=optional --ignore-scripts=false "@jalkarna/archiva@$VERSION"

          native_pkg="node_modules/@jalkarna/archiva-${ARCHIVA_NATIVE_TARGET}/package.json"
          test -f "$native_pkg"
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (pkg.version !== process.env.VERSION) {
              throw new Error(`Expected native package ${process.argv[1]} version ${process.env.VERSION}, got ${pkg.version}`);
            }
          ' "$native_pkg"

          native_bin="$tmpdir/node_modules/@jalkarna/archiva-${ARCHIVA_NATIVE_TARGET}/bin/archiva"
          test -x "$native_bin"
          actual="$("$native_bin" --version)"
          test "$actual" = "$VERSION"

          project="$(mktemp -d)"
          cd "$project"
          "$native_bin" init
          cat > sample.ts <<'TS'
          export function smoke(value: number) {
            if (value > 1 && value < 10) {
              return value + 1;
            }
            return value;
          }
          TS
          "$native_bin" write-decision --json '{"file":"sample.ts","anchor":"fn:smoke","lines":[1,7],"chose":"exercise musl published package behavior","because":"post-publish musl smoke must cover write, read, lint, status, and MCP behavior, not only version output","rejected":[{"approach":"version-only smoke","reason":"that does not prove decision storage or MCP behavior works on musl"}]}'
          "$native_bin" why sample.ts fn:smoke | grep "exercise musl published package behavior"
          "$native_bin" status | grep "1 decisions"
          "$native_bin" lint | grep "No decision issues found"
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}\n' | "$native_bin" mcp | grep '"tools"'
